{% set name = "yaqd-acton" %}
{% set version = "2023.9.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: e585ce8a2f85414a4dfdaf175b603f6ce582e9a375dc8b5fed2ec2ddab8b943e

build:
  number: 1
  noarch: python
  entry_points:
    - yaqd-acton-2150i = yaqd_acton._acton_2150i:Acton2150I.main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - flit
    - pyserial
    - yaqd-core >=2021.3.0
  run:
    - python >={{ python_min }}
    - pyserial
    - yaqd-core >=2021.3.0

test:
  imports:
    - yaqd_acton
  commands:
    - pip check
    - yaqd-acton-2150i --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.com/yaq/yaqd-acton
  summary: yaq daemons for Acton Research Corporation instruments
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
    - ksunden
